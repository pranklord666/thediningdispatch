<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            background-color: white;
            color: black;
        }
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .dropdown {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #search-button:hover {
            background-color: gray;
        }
        #results-container {
            margin-top: 20px;
            text-align: left;
        }
        .result-item {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid black;
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .result-item h3 {
            margin: 0 0 10px;
        }
        .result-item p {
            margin: 5px 0;
        }
        .instagram-post {
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }
        .message {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .error-message {
            color: red;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <!-- Dropdown for Food Type -->
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <option>Bistronomic</option>
            <option>Brewery</option>
            <option>French</option>
            <option>Fusion Cuisine</option>
            <option>Mediterranean</option>
        </select>

        <!-- Dropdown for Location -->
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <option>12th District</option>
            <option>9th District</option>
            <option>18th District</option>
            <option>11th District</option>
        </select>

        <!-- Dropdown for Subway Station -->
        <select id="subway-station" class="dropdown">
            <option value="">Select Subway Station</option>
            <option>Dausmenil</option>
            <option>Blanche</option>
            <option>Marcadet</option>
        </select>

        <!-- Dropdown for Mood -->
        <select id="mood" class="dropdown">
            <option value="">Select Mood</option>
            <option>Hidden Gem</option>
            <option>Natural Wines</option>
            <option>Romantic Spot</option>
        </select>

        <button id="search-button">Search</button>
    </div>

    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', async function () {
            const foodType = document.getElementById('food-type').value;
            const location = document.getElementById('location').value;
            const subwayStation = document.getElementById('subway-station').value;
            const mood = document.getElementById('mood').value;

            const queryParams = [];
            if (foodType) queryParams.push(`food_type=${encodeURIComponent(foodType)}`);
            if (location) queryParams.push(`location=${encodeURIComponent(location)}`);
            if (subwayStation) queryParams.push(`subway_station=${encodeURIComponent(subwayStation)}`);
            if (mood) queryParams.push(`mood=${encodeURIComponent(mood)}`);
            const queryString = queryParams.join('&');

            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch(`https://thediningdispatch-backend.onrender.com/search?${queryString}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log('Fetched data:', data); // Debugging line

                resultsContainer.innerHTML = '';
                if (data.data.length === 0) {
                    resultsContainer.innerHTML = '<p class="message">No restaurants match your search criteria.</p>';
                } else {
                    resultsContainer.innerHTML = '<p class="message">Here are your results:</p>';
                    displayResults(data.data);
                }
            } catch (error) {
                console.error('Error fetching search results:', error);
                resultsContainer.innerHTML = '<p class="error-message">An error occurred while fetching results. Please try again later.</p>';
            }
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('results-container');
            data.forEach(restaurant => {
                console.log('Restaurant data:', restaurant); // Debugging line
                if (!restaurant.instagram_link) {
                    console.error('No Instagram link specified for restaurant:', restaurant.name);
                    return;
                }

                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                resultItem.innerHTML = `
                    <h3>${restaurant.name}</h3>
                    <p><strong>Comments:</strong> ${restaurant.comments}</p>
                    <div class="instagram-post">
                        <iframe src="${restaurant.instagram_link}" width="400" height="480" frameborder="0" scrolling="no" allowtransparency="true"></iframe>
                    </div>
                `;
                resultsContainer.appendChild(resultItem);
            });
        }
    </script>
</body>
</html>
