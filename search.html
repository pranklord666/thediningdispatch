<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General Styles */
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        /* Dropdown Styles */
        .dropdown {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 300px;
            background-color: white;
            border: 2px solid black;
            border-radius: 5px;
            cursor: pointer;
        }

        .dropdown:hover {
            background-color: #f9f9f9;
        }

        /* Button Styles */
        .btn {
            text-decoration: none;
            color: black;
            background-color: white;
            padding: 10px 20px;
            border: 2px solid black;
            border-radius: 5px;
            font-size: 18px;
            font-weight: 400;
            transition: background-color 0.3s, color 0.3s;
            text-align: center;
            width: 200px;
            margin: 10px 0;
        }

        .btn:hover {
            background-color: black;
            color: white;
        }

        /* Results Section */
        #results-container {
            margin-top: 20px;
            text-align: left;
        }

        .result-item {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #000;
            border-radius: 5px;
            background-color: #fff;
        }

        .result-item h3 {
            margin: 0 0 20px;
        }

        .result-item p {
            margin: 10px 0;
        }

        .result-item a {
            color: #007BFF;
            text-decoration: none;
        }

        .result-item a:hover {
            text-decoration: underline;
        }

        .instagram-post {
            margin-top: 20px;
            text-align: center;
        }

        .message {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .error-message {
            color: red;
            font-size: 16px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }

            .dropdown {
                width: 250px;
            }

            .btn {
                font-size: 16px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <!-- Dropdown for Food Type -->
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <option>African</option>
            <option>American</option>
            <option>Asian</option>
            <option>Auvergnate</option>
            <option>Argentinian</option>
            <option>Bengladeshi</option>
            <option>Bimbimpap</option>
            <option>Bistronomic</option>
            <option>Bourgeois Cuisine</option>
            <option>Brazilian</option>
            <option>Breaded skewers</option>
            <option>Brewery</option>
            <option>Burgers</option>
            <option>Cameroonian</option>
            <option>Ceviche</option>
            <option>Chinese</option>
            <option>Contemporary French</option>
            <option>Korean</option>
            <option>Korean Barbecue</option>
            <option>Fast-food</option>
            <option>French</option>
            <option>French Sous-West</option>
            <option>Fresh Pasta</option>
            <option>Fried Chicken</option>
            <option>Fusion Cuisine</option>
            <option>Gastronomic</option>
            <option>Greek</option>
            <option>Healthy food</option>
            <option>Italian</option>
            <option>Japanese</option>
            <option>Latin American</option>
            <option>London</option>
            <option>Mezzes</option>
            <option>Mediterranean</option>
            <option>Modern French</option>
            <option>Modern Italian</option>
            <option>Neobistrot</option>
            <option>NY</option>
            <option>Oriental Cuisine</option>
            <option>Organic Cooking</option>
            <option>Peruvian</option>
            <option>Pizza</option>
            <option>Seafood</option>
            <option>Soba</option>
            <option>South American</option>
            <option>Spicy Food</option>
            <option>Taverna</option>
            <option>Tapas</option>
            <option>Terroir</option>
            <option>Traditional Chinese</option>
            <option>Traditional French</option>
            <option>Traditional Italian</option>
            <option>Venetian</option>
            <option>Vietnamese</option>
            <option>Wine Bar</option>
            <option>Worldwide Cuisine</option>
        </select>

        <!-- Dropdown for Location -->
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <option>2nd District</option>
            <option>3rd District</option>
            <option>4th District</option>
            <option>5th District</option>
            <option>6th District</option>
            <option>7th District</option>
            <option>8th District</option>
            <option>9th District</option>
            <option>10th District</option>
            <option>11th District</option>
            <option>12th District</option>
            <option>14th District</option>
            <option>16th District</option>
            <option>18th District</option>
            <option>19th District</option>
            <option>20th District</option>
            <option>Issy-les-Moulineaux</option>
        </select>

        <!-- Dropdown for Price -->
        <select id="price" class="dropdown">
            <option value="">Select Price</option>
            <option>€</option>
            <option>€€</option>
            <option>€€€</option>
            <option>€€€€</option>
        </select>

        <button id="search-button" class="btn">Search</button>
        <a href="index.html" class="btn">Home</a>
    </div>

    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', async function () {
            const criteria = {
                foodType: document.getElementById('food-type').value,
                location: document.getElementById('location').value,
                price: document.getElementById('price').value
            };

            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<p>Loading...</p>';

            try {
                await searchRestaurants(criteria, resultsContainer);
            } catch (error) {
                console.error('Error fetching search results:', error);
                resultsContainer.innerHTML = '<p class="error-message">An error occurred while fetching results. Please try again later.</p>';
            }
        });

        async function searchRestaurants(criteria, resultsContainer, removedCriteria = []) {
            const queryParams = [];
            if (criteria.foodType) queryParams.push(`food_type=${encodeURIComponent(criteria.foodType)}`);
            if (criteria.location) queryParams.push(`location=${encodeURIComponent(criteria.location)}`);
            if (criteria.price) queryParams.push(`price=${encodeURIComponent(criteria.price)}`);
            const queryString = queryParams.join('&');

            const response = await fetch(`https://thediningdispatch-backend.onrender.com/search?${queryString}`);
            const data = await response.json();

            resultsContainer.innerHTML = '';
            if (data.data.length === 0) {
                if (removedCriteria.length < 3) {
                    const criteriaKeys = Object.keys(criteria).filter(key => criteria[key]);
                    const criterionToRemove = criteriaKeys[removedCriteria.length];
                    const newCriteria = { ...criteria };
                    newCriteria[criterionToRemove] = '';
                    removedCriteria.push(criterionToRemove);
                    return searchRestaurants(newCriteria, resultsContainer, removedCriteria);
                } else {
                    resultsContainer.innerHTML = '<p class="message">No restaurants match your search criteria.</p>';
                }
            } else {
                if (removedCriteria.length > 0) {
                    resultsContainer.innerHTML = `<p class="message">No exact match. Here are some results without the ${removedCriteria.map(criterion => criterion.replace(/([A-Z])/g, ' $1').trim()).join(' and ')} criteria:</p>`;
                } else {
                    resultsContainer.innerHTML = '<p class="message">Here are your results:</p>';
                }
                displayResults(data.data, resultsContainer);
            }
        }

        function displayResults(data, resultsContainer) {
            data.forEach(restaurant => {
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');

                // Extract the Google Maps link and the address
                const addressParts = restaurant.Address.split(' ');
                const googleMapsLink = addressParts.shift();
                const address = addressParts.join(' ');

                resultItem.innerHTML = `
                    <h3>${restaurant.Name}</h3>
                    <p><strong>Location:</strong> ${restaurant.Location}</p>
                    <p><strong>Price:</strong> ${restaurant.Price}</p>
                    <p><strong>Food Type:</strong> ${restaurant.Type_of_Food}</p>
                    <p><strong>Address:</strong> <a href="${googleMapsLink}" target="_blank">${address}</a></p>
                    <a href="${restaurant.Article}" target="_blank">Read more</a>
                `;
                resultsContainer.appendChild(resultItem);
            });
        }
    </script>
</body>
</html>
