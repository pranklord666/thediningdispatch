<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/main.css">
    <style>
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .dropdown {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 300px;
        }
        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #results-container {
            margin-top: 20px;
            padding: 20px;
        }
        .result-item {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <!-- Dropdown for Food Type -->
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <!-- Food Type Options -->
            <option>Bistronomic</option>
            <option>Brewery</option>
            <option>French Sous-West</option>
            <option>French</option>
            <option>Contemporary French</option>
            <option>Fusion Cuisine</option>
            <option>Tapas</option>
            <option>Mediterranean</option>
            <!-- Add other options based on your criteria -->
        </select>

        <!-- Dropdown for Location -->
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <!-- Location Options -->
            <option>12th District, Dausmenil</option>
            <option>9th District, Blanche</option>
            <option>18th District, Marcadet</option>
            <option>11th District, Saint-Maur</option>
            <option>5th District, Maubert Mutualité</option>
            <option>20th District, Belleville</option>
            <!-- Add other options based on your criteria -->
        </select>

        <!-- Dropdown for Mood -->
        <select id="mood" class="dropdown">
            <option value="">Select Mood</option>
            <!-- Mood Options -->
            <option>Real product work</option>
            <option>Welcoming</option>
            <option>Hidden Gem</option>
            <option>Natural Wines</option>
            <option>Talented Chef</option>
            <option>Romantic Spot</option>
            <option>3-star Chef</option>
            <!-- Add other options based on your criteria -->
        </select>

        <button id="search-button">Search</button>
    </div>

    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', function () {
            const foodType = document.getElementById('food-type').value;
            const location = document.getElementById('location').value;
            const mood = document.getElementById('mood').value;

            // Build the query string
            const queryParams = [];
            if (foodType) queryParams.push(`food_type=${encodeURIComponent(foodType)}`);
            if (location) queryParams.push(`location=${encodeURIComponent(location)}`);
            if (mood) queryParams.push(`mood=${encodeURIComponent(mood)}`);
            const queryString = queryParams.join('&');

            // Clear previous results
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '';

            // Fetch search results from the Flask backend
            fetch(`http://127.0.0.1:5000/search?${queryString}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        resultsContainer.innerHTML = '<p>No results found.</p>';
                    } else {
                        data.forEach(restaurant => {
                            const resultItem = document.createElement('div');
                            resultItem.classList.add('result-item');
                            resultItem.innerHTML = `
                                <h3>${restaurant.name}</h3>
                                <p><strong>Location:</strong> ${restaurant.location}</p>
                                <p><strong>Food Type:</strong> ${restaurant.food_type}</p>
                                <p><strong>Mood:</strong> ${restaurant.mood}</p>
                                <p><strong>Price:</strong> ${restaurant.price}</p>
                                <p><strong>Comments:</strong> ${restaurant.comments}</p>
                                <a href="${restaurant.article}" target="_blank">Read more</a>
                            `;
                            resultsContainer.appendChild(resultItem);
                        });
                    }
                })
                .catch(error => {
                    console.error('Error fetching search results:', error);
                    resultsContainer.innerHTML = '<p>An error occurred while fetching results.</p>';
                });
        });
    </script>
</body>
</html>
