<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .dropdown {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 300px;
        }
        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #search-button:hover {
            background-color: #0056b3;
        }
        #results-container {
            margin-top: 20px;
            text-align: left;
        }
        .result-item {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #000;
            border-radius: 5px;
            background-color: #fff;
        }
        .result-item h3 {
            margin: 0 0 10px;
        }
        .result-item p {
            margin: 5px 0;
        }
        .result-item a {
            color: #007BFF;
            text-decoration: none;
        }
        .result-item a:hover {
            text-decoration: underline;
        }
        .instagram-post {
            margin-top: 10px;
            text-align: center;
        }
        .message {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .error-message {
            color: red;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <!-- Dropdown for Food Type -->
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <option>African</option>
            <option>American</option>
            <option>Asian</option>
            <option>Auvergnate</option>
            <option>Argentinian</option>
            <option>Bengladeshi</option>
            <option>Bimbimpap</option>
            <option>Bistronomic</option>
            <option>Bourgeois Cuisine</option>
            <option>Brazilian</option>
            <option>Breaded skewers</option>
            <option>Brewery</option>
            <option>Burgers</option>
            <option>Cameroonian</option>
            <option>Ceviche</option>
            <option>Chinese</option>
            <option>Contemporary French</option>
            <option>Corean</option>
            <option>Corean Barbecue</option>
            <option>Fast-food</option>
            <option>French</option>
            <option>French Sous-West</option>
            <option>Fresh Pasta</option>
            <option>Fried Chicken</option>
            <option>Fusion Cuisine</option>
            <option>Gastronomic</option>
            <option>Greek</option>
            <option>Healthy food</option>
            <option>Italian</option>
            <option>Japanese</option>
            <option>Latino-American</option>
            <option>London</option>
            <option>Mezzes</option>
            <option>Mediterranean</option>
            <option>Modern French</option>
            <option>Modern Italian</option>
            <option>Neobistrot</option>
            <option>NY</option>
            <option>Oriental Cuisine</option>
            <option>Organic Cooking</option>
            <option>Peruvian</option>
            <option>Pizza</option>
            <option>Seafood</option>
            <option>Soba</option>
            <option>South-American</option>
            <option>Spicy Food</option>
            <option>Taverna</option>
            <option>Tapas</option>
            <option>Terroir</option>
            <option>Traditional Chinese</option>
            <option>Traditional French</option>
            <option>Traditional Italian</option>
            <option>Venetian</option>
            <option>Vietnamese</option>
            <option>Wine Bar</option>
            <option>Worldwide Cuisine</option>
        </select>

        <!-- Dropdown for Location -->
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <option>2nd District</option>
            <option>3rd District</option>
            <option>4th District</option>
            <option>5th District</option>
            <option>6th District</option>
            <option>7th District</option>
            <option>8th District</option>
            <option>9th District</option>
            <option>10th District</option>
            <option>11th District</option>
            <option>12th District</option>
            <option>14th District</option>
            <option>16th District</option>
            <option>18th District</option>
            <option>19th District</option>
            <option>20th District</option>
            <option>Issy-les-Moulineaux</option>
        </select>

        <!-- Dropdown for Price -->
        <select id="price" class="dropdown">
            <option value="">Select Price</option>
            <option>€</option>
            <option>€€</option>
            <option>€€€</option>
            <option>€€€€</option>
        </select>

        <button id="search-button">Search</button>
    </div>

    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', async function () {
            const foodType = document.getElementById('food-type').value;
            const location = document.getElementById('location').value;
            const price = document.getElementById('price').value;

            // Build the query string
            const queryParams = [];
            if (foodType) queryParams.push(`food_type=${encodeURIComponent(foodType)}`);
            if (location) queryParams.push(`location=${encodeURIComponent(location)}`);
            if (price) queryParams.push(`price=${encodeURIComponent(price)}`);
            const queryString = queryParams.join('&');

            // Clear previous results
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<p>Loading...</p>';

            try {
                // Fetch search results from the backend
                const response = await fetch(`https://thediningdispatch-backend.onrender.com/search?${queryString}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                // Clear loading message and display results
                resultsContainer.innerHTML = '';
                if (data.data.length === 0) {
                    resultsContainer.innerHTML = '<p class="message">No restaurants match your search criteria.</p>';
                } else {
                    resultsContainer.innerHTML = '<p class="message">Here are your results:</p>';
                    displayResults(data.data);
                }
            } catch (error) {
                console.error('Error fetching search results:', error);
                resultsContainer.innerHTML = '<p class="error-message">An error occurred while fetching results. Please try again later.</p>';
            }
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('results-container');
            data.forEach(restaurant => {
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                resultItem.innerHTML = `
                    <h3>${restaurant.name}</h3>
                    <p><strong>Location:</strong> ${restaurant.location}</p>
                    <p><strong>Price:</strong> ${restaurant.price}</p>
                    <p><strong>Food Type:</strong> ${restaurant.food_type}</p>
                    <p><strong>Comments:</strong> ${restaurant.comments}</p>
                    <a href="${restaurant.article}" target="_blank">Read more</a>
                    <div class="instagram-post">
                        <iframe src="${restaurant.instagram_link}" width="400" height="480" frameborder="0" scrolling="no" allowtransparency="true"></iframe>
                    </div>
                `;
                resultsContainer.appendChild(resultItem);
            });
        }
    </script>
</body>
</html>
