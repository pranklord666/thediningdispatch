<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .dropdown {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            width: 300px;
        }
        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #search-button:hover {
            background-color: #0056b3;
        }
        #results-container {
            margin-top: 20px;
            text-align: left;
        }
        .result-item {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .result-item a {
            color: #007BFF;
            text-decoration: none;
        }
        .result-item a:hover {
            text-decoration: underline;
        }
        .message {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .error-message {
            color: red;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <!-- Dropdown for Food Type -->
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <option>Bistronomic</option>
            <option>Brewery</option>
            <option>French Sous-West</option>
            <option>French</option>
            <option>Contemporary French</option>
            <option>Fusion Cuisine</option>
            <option>Tapas</option>
            <option>Mediterranean</option>
        </select>

        <!-- Dropdown for Location -->
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <option>12th District</option>
            <option>9th District</option>
            <option>18th District</option>
            <option>11th District</option>
            <option>5th District</option>
            <option>20th District</option>
        </select>

        <!-- Dropdown for Subway Station -->
        <select id="subway-station" class="dropdown">
            <option value="">Select Subway Station</option>
            <option>Dausmenil</option>
            <option>Blanche</option>
            <option>Marcadet</option>
            <option>Bois de Boulogne</option>
            <option>Saint-Georges</option>
            <option>Ecole Militaire</option>
            <option>Saint-Maur</option>
            <option>Belleville</option>
        </select>

        <!-- Dropdown for Mood -->
        <select id="mood" class="dropdown">
            <option value="">Select Mood</option>
            <option>Real product work</option>
            <option>Welcoming</option>
            <option>Hidden Gem</option>
            <option>Natural Wines</option>
            <option>Talented Chef</option>
            <option>Romantic Spot</option>
            <option>3-star Chef</option>
        </select>

        <button id="search-button">Search</button>
    </div>

    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>

    <script>
        document.getElementById('search-button').addEventListener('click', async function () {
            const foodType = document.getElementById('food-type').value;
            const location = document.getElementById('location').value;
            const subwayStation = document.getElementById('subway-station').value;
            const mood = document.getElementById('mood').value;

            // Build the query string
            const queryParams = [];
            if (foodType) queryParams.push(`food_type=${encodeURIComponent(foodType)}`);
            if (location) queryParams.push(`location=${encodeURIComponent(location)}`);
            if (subwayStation) queryParams.push(`subway_station=${encodeURIComponent(subwayStation)}`);
            if (mood) queryParams.push(`mood=${encodeURIComponent(mood)}`);
            const queryString = queryParams.join('&');

            // Clear previous results
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<p>Loading...</p>';

            try {
                // Fetch search results from the backend
                const response = await fetch(`https://thediningdispatch-backend.onrender.com/search?${queryString}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();

                // Clear loading message and display results
                resultsContainer.innerHTML = '';
                if (data.data.length === 0) {
                    resultsContainer.innerHTML = '<p class="message">No restaurants match your search criteria.</p>';
                } else {
                    resultsContainer.innerHTML = '<p class="message">Here are your results:</p>';
                    displayResults(data.data);
                }
            } catch (error) {
                console.error('Error fetching search results:', error);
                resultsContainer.innerHTML = '<p class="error-message">An error occurred while fetching results. Please try again later.</p>';
            }
        });

        function displayResults(data) {
            const resultsContainer = document.getElementById('results-container');
            data.forEach(restaurant => {
                const resultItem = document.createElement('div');
                resultItem.classList.add('result-item');
                resultItem.innerHTML = `
                    <h3>${restaurant.name}</h3>
                    <p><strong>Location:</strong> ${restaurant.location}</p>
                    <p><strong>Subway Station:</strong> ${restaurant.subway_station}</p>
                    <p><strong>Food Type:</strong> ${restaurant.food_type}</p>
                    <p><strong>Mood:</strong> ${restaurant.mood}</p>
                    <p><strong>Price:</strong> ${restaurant.price}</p>
                    <p><strong>Comments:</strong> ${restaurant.comments}</p>
                    <a href="${restaurant.article}" target="_blank">Read more</a>
                `;
                resultsContainer.appendChild(resultItem);
            });
        }
    </script>
</body>
</html>
