<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
        }
        .search-container {
            margin: 20px 0;
        }
        .dropdown, .btn {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
            border: 2px solid black;
            border-radius: 5px;
        }
        .btn {
            background-color: white;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
        }
        .btn:hover {
            background-color: black;
            color: white;
        }
        .result-item {
            border: 1px solid #000;
            padding: 15px;
            margin: 10px 0;
            text-align: left;
        }
        .instagram-post {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <select id="food-type" class="dropdown">
            <option value="">Select Food Type</option>
            <option>Bistronomic</option>
            <option>French</option>
            <option>Italian</option>
            <option>Asian</option>
            <!-- Add more options -->
        </select>
        <select id="location" class="dropdown">
            <option value="">Select Location</option>
            <option>2nd District</option>
            <option>12th District</option>
            <option>16th District</option>
            <option>Issy-les-Moulineaux</option>
            <!-- Add more options -->
        </select>
        <select id="price" class="dropdown">
            <option value="">Select Price</option>
            <option>€</option>
            <option>€€</option>
            <option>€€€</option>
            <option>€€€€</option>
        </select>
        <button id="search-button" class="btn">Search</button>
    </div>
    <div id="results-container"></div>

    <script>
        document.getElementById('search-button').addEventListener('click', async () => {
            const criteria = {
                foodType: document.getElementById('food-type').value,
                location: document.getElementById('location').value,
                price: document.getElementById('price').value
            };
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '<p>Loading...</p>';

            try {
                const queryParams = [];
                if (criteria.foodType) queryParams.push(`food_type=${encodeURIComponent(criteria.foodType)}`);
                if (criteria.location) queryParams.push(`location=${encodeURIComponent(criteria.location)}`);
                if (criteria.price) queryParams.push(`price=${encodeURIComponent(criteria.price)}`);
                const queryString = queryParams.join('&');

                const response = await fetch(`http://localhost:5000/search?${queryString}`);
                const data = await response.json();

                if (data.data.length === 0) {
                    resultsContainer.innerHTML = '<p>No results found.</p>';
                } else {
                    resultsContainer.innerHTML = '';
                    data.data.forEach(restaurant => {
                        resultsContainer.innerHTML += `
                            <div class="result-item">
                                <h3>${restaurant.name}</h3>
                                <p><strong>Address:</strong> ${restaurant.address}</p>
                                <p><strong>Subway:</strong> ${restaurant.subway}</p>
                                <p><strong>Comments:</strong> ${restaurant.comments}</p>
                                <p><strong>Mood:</strong> ${restaurant.mood}</p>
                                <div class="instagram-post">${restaurant.instagram_iframe || 'No Instagram post'}</div>
                                <p><strong>Booking:</strong> <a href="${restaurant.booking_link}" target="_blank">Book Now</a></p>
                                <p><strong>Menu:</strong> <a href="${restaurant.menu_link}" target="_blank">View Menu</a></p>
                                <p><strong>Chef:</strong> ${restaurant.chef_link || 'Not available'}</p>
                            </div>
                        `;
                    });
                }
            } catch (error) {
                resultsContainer.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
