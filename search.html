<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Restaurant - The Dining Dispatch</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/main.css">
    <style>
        .search-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        #search-input {
            padding: 10px;
            font-size: 16px;
            width: 300px;
            margin-right: 10px;
        }
        #search-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #results-container {
            margin-top: 20px;
            padding: 20px;
        }
        .result-item {
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result-item h3 {
            margin: 0 0 10px;
        }
        .result-item p {
            margin: 5px 0;
        }
        .result-item a {
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Find a Restaurant</h1>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for restaurants...">
        <button id="search-button">Search</button>
    </div>
    <div id="results-container">
        <!-- Search results will be dynamically inserted here -->
    </div>
    <script>
        document.getElementById('search-button').addEventListener('click', function () {
            const query = document.getElementById('search-input').value;

            // Clear previous results
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '';

            // Fetch search results from the Flask backend
            fetch(`http://127.0.0.1:5000/search?query=${query}`)
                .then(response => response.json())
                .then(data => {
                    if (data.length === 0) {
                        resultsContainer.innerHTML = '<p>No results found.</p>';
                    } else {
                        data.forEach(restaurant => {
                            const resultItem = document.createElement('div');
                            resultItem.classList.add('result-item');

                            resultItem.innerHTML = `
                                <h3>${restaurant.name}</h3>
                                <p><strong>Location:</strong> ${restaurant.location}</p>
                                <p><strong>Food Type:</strong> ${restaurant.food_type}</p>
                                <p><strong>Mood:</strong> ${restaurant.mood}</p>
                                <p><strong>Price:</strong> ${restaurant.price}</p>
                                <p><strong>Comments:</strong> ${restaurant.comments}</p>
                                <a href="${restaurant.article}" target="_blank">Read more</a>
                            `;
                            resultsContainer.appendChild(resultItem);
                        });
                    }
                })
                .catch(error => {
                    console.error('Error fetching search results:', error);
                    resultsContainer.innerHTML = '<p>An error occurred while fetching results.</p>';
                });
        });
    </script>
</body>
</html>
