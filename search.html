<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>
  <style>
    .search-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
    }
    .search-container form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search-container input, .search-container button {
      padding: 10px;
      font-size: 16px;
    }
    .results {
      margin-top: 20px;
    }
    .results div {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="search-container">
    <h1>Search for Restaurants</h1>
    <form id="search-form">
      <label for="food_type">Type of Food:</label>
      <input type="text" id="food_type" name="food_type"/>

      <label for="location">Location:</label>
      <input type="text" id="location" name="location"/>

      <label for="price">Price:</label>
      <input type="text" id="price" name="price"/>

      <button type="submit">Search</button>
    </form>
    <div id="results" class="results"></div>
  </div>

  <script>
    document.getElementById('search-form').addEventListener('submit', function(event) {
      event.preventDefault();

      const foodType = document.getElementById('food_type').value;
      const location = document.getElementById('location').value;
      const price = document.getElementById('price').value;

      const url = `https://your-backend-url.onrender.com/search?food_type=${foodType}&location=${location}&price=${price}`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '';
          if (data.data.length > 0) {
            data.data.forEach(restaurant => {
              const restaurantDiv = document.createElement('div');
              restaurantDiv.innerHTML = `
                <h2>${restaurant.Name}</h2>
                <p>${restaurant.Comments}</p>
                <p>${restaurant.Location}</p>
                <p>${restaurant.Type_of_Food}</p>
                <p>${restaurant.Price}</p>
                <p>${restaurant.Mood}</p>
                <p>${restaurant.Article}</p>
                <p>${restaurant.Instagram_Link}</p>
                <p>${restaurant.Address}</p>
                <p>${restaurant.Booking}</p>
                <p>${restaurant.Chef}</p>
                <p>${restaurant.Menu}</p>
                <p>${restaurant.Subway}</p>
              `;
              resultsDiv.appendChild(restaurantDiv);
            });
          } else {
            resultsDiv.innerHTML = '<p>No restaurants match your search criteria.</p>';
          }
        })
        .catch(error => {
          console.error('Error:', error);
          const resultsDiv = document.getElementById('results');
          resultsDiv.innerHTML = '<p>An error occurred while fetching the data.</p>';
        });
    });
  </script>
</body>
</html>
