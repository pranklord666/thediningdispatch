<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curated Ten</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/main.css">
    <style>
        /* Inline styles for minimal customization */
        .month-section {
            background-color: #f5f5f5; /* Light gray background */
            padding: 20px;
            border-radius: 10px; /* Rounded corners */
            text-align: center;
            margin: 20px auto; /* Center and add space */
            max-width: 400px; /* Limit the width */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Subtle shadow for a modern look */
        }

        .month-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .month-buttons {
            display: flex;
            justify-content: center;
            gap: 10px; /* Space between buttons */
        }

        .btn {
            padding: 10px 20px;
            font-size: 1em;
            text-decoration: none;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <!-- Header Section -->
    <header>
        <h1>The Curated Ten</h1>
        <p>Discover our handpicked top 10 spots in Paris, from cozy cafés to the best kebabs. Updated weekly!</p>
    </header>

    <!-- Monthly Section -->
    <section class="month-section">
        <div class="month-title">January</div>
        <div class="month-buttons">
            <a href="publications/decemberrestaurants.html" class="btn">Restaurants Picks</a>
            <a href="publications/brunchs.html" class="btn">Brunch Picks</a>
        </div>
    </section>

    <!-- This Week's Selection -->
    <section id="this-week">
    </section>

    <!-- Footer Section -->
    <footer>
        <div class="buttons">
            <a href="index.html" class="btn">Home</a>
        </div>
    </footer>
</body>
</html>
