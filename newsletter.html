<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBSCRIBE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/main.css">
    <style>
        .btn-spacing {
            margin: 10px; /* Uniform spacing */
        }

        .language-buttons {
            display: flex;
            justify-content: center;
            gap: 10px; /* Reduced spacing between buttons */
        }

        .newsletter-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .newsletter-frame iframe {
            width: 100%;
            max-width: 480px;
            height: auto;
            aspect-ratio: 480 / 320; /* Maintains the aspect ratio */
            border: 1px solid #EEE;
            background: white;
        }

        .cta {
            display: flex;
            justify-content: center;
            margin-top: 30px; /* Maintains distance for the "Home" button */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Subscribe to The Dining Dispatch</h1>
        <p>Select your preferred language:</p>

        <div class="language-buttons">
            <button class="btn btn-spacing" onclick="showNewsletter('english')">English</button>
            <button class="btn btn-spacing" onclick="showNewsletter('french')">Français</button>
        </div>

        <div id="english-newsletter" class="newsletter-frame" style="display: none;">
            <iframe src="https://thediningdispatchv2.substack.com/embed"
                    frameborder="0" scrolling="no">
            </iframe>
        </div>

        <div id="french-newsletter" class="newsletter-frame" style="display: none;">
            <iframe src="https://thediningdispatch.substack.com/embed"
                    frameborder="0" scrolling="no">
            </iframe>
        </div>

        <div class="cta">
            <button onclick="window.location.href='index.html'" class="btn btn-spacing">Home</button>
        </div>
    </div>

    <script>
        function showNewsletter(language) {
            document.getElementById('english-newsletter').style.display = 'none';
            document.getElementById('french-newsletter').style.display = 'none';

            if (language === 'english') {
                document.getElementById('english-newsletter').style.display = 'flex';
            } else if (language === 'french') {
                document.getElementById('french-newsletter').style.display = 'flex';
            }
        }
    </script>
</body>
</html>
