<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - The Dining Dispatch</title>
    <link rel="stylesheet" href="static/main.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .buttons {
            margin-bottom: 30px; /* Espace entre les boutons et l'image */
        }

        .footer-banner {
            width: 100%; /* L'image couvre toute la largeur */
            height: 100vh; /* La hauteur couvre toute la hauteur de l'écran */
            object-fit: cover; /* L'image couvre tout l'écran sans être tronquée */
            position: relative; /* Positionne l'image de manière relative */
            top: 0; /* Colle l'image en haut */
            left: 0; /* Colle l'image à gauche */
            right: 0; /* Colle l'image à droite */
        }

        @media (max-width: 600px) {
            .footer-banner {
                height: calc(100vh - 150px); /* Réduction pour les petits écrans */
                object-fit: contain; /* Affiche l'image en entier sans la rogner */
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to The Dining Dispatch</h1>
    <div class="buttons">
        <a href="./search.html" class="btn">Find a Restaurant</a>
        <a href="./articles.html" class="btn">The Curated Ten</a>
        <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
        <a href="./about.html" class="btn">About Us</a>
        <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>

    <!-- Footer Banner -->
    <img src="static/banner.png" alt="Footer Banner" class="footer-banner">
</body>
</html>
