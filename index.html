<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>

  <style>
    /* Container to center everything and control overall width */
    .wave-container {
      position: relative;   /* So we can easily position elements inside */
      width: 80%;           /* Adjust as needed */
      margin: 20px auto;    /* Center in the page */
    }

    /* SVG takes full container width (80% of page). 
       Height auto => preserves aspect ratio. */
    .wave-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* The outline text style matching your main.css (h1-like). 
       Make sure you keep your imported font if needed. */
    .wave-text {
      fill: black;   
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
    }

    /* This .buttons is from main.css, but repeated here if you need to refine 
       layout inside the wave. Feel free to remove if you want to rely only 
       on main.css. */
    .buttons {
      margin-top: 60px;  /* Add some top spacing so they sit nicely below the wave */
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="wave-container">
    <!-- SVG wave “box” that encloses the buttons.
         We create the wavy top with 5 undulations from x=50 to x=550, 
         then draw straight lines down to y=300 and back to x=50 to form a closed shape. 
         stroke="black" + fill="none" => Just the outline. 
         Feel free to change stroke-width or add a fill color. -->
    <svg 
      class="wave-svg"
      viewBox="0 0 600 350"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Wavy top edge with 5 arcs, then a rectangle down to y=300, and close -->
      <path
        d="
          M 50,100
          C 83,80   117,120  150,100
          C 183,80   217,120  250,100
          C 283,80   317,120  350,100
          C 383,80   417,120  450,100
          C 483,80   517,120  550,100
          L 550,300
          L 50,300
          Z
        "
        stroke="black"
        stroke-width="2"
        fill="none"
      />

      <!-- Text placed near the top center of the wave. 
           Adjust x/y to move it horizontally or vertically. -->
      <text 
        x="300" 
        y="70" 
        text-anchor="middle" 
        class="wave-text"
      >
        THE DINING DISPATCH
      </text>
    </svg>

    <!-- Buttons sit within the wavy outline (below the wave).
         You can still style them in main.css. -->
    <div class="buttons">
      <a href="./search.html" class="btn">Find a Restaurant</a>
      <a href="./articles.html" class="btn">The Curated Ten</a>
      <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
      <a href="./about.html" class="btn">About Us</a>
      <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>
  </div>

</body>
</html>
