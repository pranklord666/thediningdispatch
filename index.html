<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>

  <style>
    .wave-container {
      position: relative; /* So we can easily position elements inside */
      width: 80%;
      margin: 20px auto;  /* Center in the page */
    }

    /* The SVG wave outline takes full container width */
    .wave-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    /* Text style matching your main.css (like an h1) */
    .wave-text {
      fill: black;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
    }

    /* A bit of extra top margin to place the buttons below the wave */
    .buttons {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="wave-container">
    <!-- SVG wave “box” that encloses the buttons, with 5 undulations at the top.
         Stroke and border thickness is 2px to match your .btn border. -->
    <svg 
      class="wave-svg"
      viewBox="0 0 600 350"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Wavy top edge with 5 arcs, then straight edges down to y=300, and close -->
      <path
        d="
          M 50,100
          C 83,80   117,120  150,100
          C 183,80   217,120  250,100
          C 283,80   317,120  350,100
          C 383,80   417,120  450,100
          C 483,80   517,120  550,100
          L 550,300
          L 50,300
          Z
        "
        stroke="black"
        stroke-width="2"
        fill="none"
      />

      <!-- Text placed near the top center of the wave -->
      <text 
        x="300" 
        y="70" 
        text-anchor="middle" 
        class="wave-text"
      >
        THE DINING DISPATCH
      </text>
    </svg>

    <!-- Buttons sit within the wave outline -->
    <div class="buttons">
      <a href="./search.html" class="btn">Find a Restaurant</a>
      <a href="./articles.html" class="btn">The Curated Ten</a>
      <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
      <a href="./about.html" class="btn">About Us</a>
      <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>
  </div>

</body>
</html>
