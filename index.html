<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>

  <style>
    .wave-container {
      position: relative; 
      width: 80%;
      margin: 20px auto;  /* Center in the page */
    }

    .wave-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .wave-text {
      fill: black;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
    }

    /* Reduced top margin to make the wave and first button closer */
    .buttons {
      margin-top: 10px; /* was 30px previously */
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }
  </style>
</head>
<body>

  <div class="wave-container">
    <!-- 
      Updated wave:
      - viewBox is now 600 wide x 250 tall (was 350).
      - The path closes at y=200 (instead of 300).
    -->
    <svg 
      class="wave-svg"
      viewBox="0 0 600 250"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Wavy top edge with 5 arcs, then straight edges down to y=200, then close -->
      <path
        d="
          M 50,100
          C 83,80   117,120  150,100
          C 183,80   217,120  250,100
          C 283,80   317,120  350,100
          C 383,80   417,120  450,100
          C 483,80   517,120  550,100
          L 550,200
          L 50,200
          Z
        "
        stroke="black"
        stroke-width="2"  <!-- Matches .btn border thickness -->
        fill="none"
      />

      <!-- Text at the top center of the wave -->
      <text 
        x="300" 
        y="75" 
        text-anchor="middle" 
        class="wave-text"
      >
        THE DINING DISPATCH
      </text>
    </svg>

    <!-- Buttons below the wave shape (but visually close to it) -->
    <div class="buttons">
      <a href="./search.html" class="btn">Find a Restaurant</a>
      <a href="./articles.html" class="btn">The Curated Ten</a>
      <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
      <a href="./about.html" class="btn">About Us</a>
      <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>
  </div>

</body>
</html>
