<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>

  <style>
    /* Container for the wave design */
    .wave-container {
      position: relative; 
      width: 80%;
      margin: 20px auto; /* Center in the page */
    }

    .wave-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .wave-text {
      fill: black;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
    }

    .buttons {
      margin-top: 10px; /* Buttons appear closer to the wave */
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    /* Full-width heading above the wave
       - text-align: center keeps it centered
       - letter-spacing spreads letters horizontally
       - margin-bottom ensures a little gap before the wave */
    .title-heading {
      width: 100%;
      text-align: center;
      font-size: 32px;
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      letter-spacing: 0.2em;  /* Adjust to spread out letters more or less */
      margin: 40px 0 20px 0;  /* Top/bottom margins (40px top, 20px bottom) */
    }
  </style>
</head>
<body>

  <!-- Text Above the Wave -->
  <div class="title-heading">
    THE DINING DISPATCH
  </div>

  <div class="wave-container">
    <!-- Wave outline with 5 undulations at the top -->
    <svg 
      class="wave-svg"
      viewBox="0 0 600 250"
      xmlns="http://www.w3.org/2000/svg"
    >
      <path
        d="
          M 50,100
          C 83,80   117,120  150,100
          C 183,80   217,120  250,100
          C 283,80   317,120  350,100
          C 383,80   417,120  450,100
          C 483,80   517,120  550,100
          L 550,200
          L 50,200
          Z
        "
        stroke="black"
        stroke-width="2"
        fill="none"
      />
    </svg>

    <!-- Buttons (visually within the wave outline) -->
    <div class="buttons">
      <a href="./search.html" class="btn">Find a Restaurant</a>
      <a href="./articles.html" class="btn">The Curated Ten</a>
      <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
      <a href="./about.html" class="btn">About Us</a>
      <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>
  </div>

</body>
</html>
