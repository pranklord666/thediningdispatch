<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home - The Dining Dispatch</title>
  <link rel="stylesheet" href="static/main.css"/>
  <style>
    .title-container {
      position: relative;
      width: 80%;
      margin: 20px auto 0;
      /* You can give this a min-height if needed */
      min-height: 500px; /* for example, to ensure there's enough room */
    }

    .wave-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .buttons-over-image {
      position: absolute;
      top: 150px;      /* move the buttons higher or lower as needed */
      left: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      /* Key: ensure the buttons appear above the SVG if overlapping */
      z-index: 1;
    }

    .wave-text {
      font-family: 'Roboto', sans-serif;
      font-weight: 700;
      font-size: 24px;
      fill: black;
    }
  </style>
</head>
<body>
  <div class="title-container">
    <!-- Wave SVG -->
    <svg 
      class="wave-svg"
      viewBox="0 0 600 300"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Left vertical line -->
      <path
        d="M 50,0
           V 100"
        stroke="black"
        stroke-width="2"
        fill="none"
      />

      <!-- Wave with 3 arcs -->
      <path
        d="M 50,100
           C 120,20 180,180 250,100
           C 320,20 380,180 450,100
           C 520,20 580,180 550,100"
        stroke="black"
        stroke-width="2"
        fill="none"
      />

      <!-- Right vertical line -->
      <path
        d="M 550,0
           V 100"
        stroke="black"
        stroke-width="2"
        fill="none"
      />

      <!-- Wave text (centered in each valley) -->
      <text x="150" y="95" text-anchor="middle" class="wave-text">THE</text>
      <text x="350" y="95" text-anchor="middle" class="wave-text">DINING</text>
      <text x="525" y="95" text-anchor="middle" class="wave-text">DISPATCH</text>
    </svg>

    <!-- Buttons on top of the wave -->
    <div class="buttons-over-image">
      <a href="./search.html" class="btn">Find a Restaurant</a>
      <a href="./articles.html" class="btn">The Curated Ten</a>
      <a href="./newsletter.html" class="btn">Subscribe to Newsletter</a>
      <a href="./about.html" class="btn">About Us</a>
      <a href="https://www.instagram.com/the_diningdispatch/" target="_blank" class="btn">Follow us on Instagram</a>
    </div>
  </div>
</body>
</html>
